<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Red Ghost - Официальный сайт</title>
    <style>
        /* ========== ПОДКЛЮЧЕНИЕ ШРИФТОВ ========== */
        @font-face {
            font-family: 'SabFont';
            src: url('fonts/sab.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'SabFont2';
            src: url('fonts/sab2.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }
        /* Третий шрифт — для заголовков страниц */
        @font-face {
            font-family: 'SabFont3';
            src: url('fonts/sab3.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }
        /* ========== ОБЩИЕ СТИЛИ ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SabFont2', Arial, sans-serif;
            color: #ffffff;
            line-height: 1.5;
            min-height: 100vh;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            transition: background-image 0.5s ease-in-out;
            background-color: #0a0a0a;
        }

        /* Затемнение фона для читаемости текста */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: -1;
        }

        /* ========== ШАПКА ========== */
        .header {
            padding: 20px 40px;
            border-bottom: 1px solid rgba(255, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: #0a0a0a;
        }

        .logo {
            font-family: 'SabFont', Arial, sans-serif;
            font-size: 2rem;
            color: #fff;
            text-shadow: 0 0 5px #ff0000, 0 0 10px #cc0000;
            letter-spacing: 2px;
        }

        .nav-menu {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .nav-menu a {
            font-family: 'SabFont', Arial, sans-serif;
            color: #ffffff;
            text-decoration: none;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            padding: 5px 0;
            cursor: pointer;
        }

        .nav-menu a:hover {
            color: #ff3333;
            text-shadow: 0 0 5px #ff0000, 0 0 10px #cc0000;
        }

        /* ========== ОСНОВНОЙ КОНТЕНТ ========== */
        .main-content {
            min-height: 70vh;
            padding: 60px 40px;
        }

        .page-title {
            font-family: 'SabFont3', Arial, sans-serif;
            font-size: 3rem;
            color: #ffffff;
            text-shadow: 0 0 5px #ff0000, 0 0 10px #cc0000;
            margin-bottom: 30px;
            letter-spacing: 2px;
            border-left: 4px solid #ff0000;
            padding-left: 20px;
        }

        .content-text {
            font-family: 'SabFont2', Arial, sans-serif;
            font-size: 1.2rem;
            color: #ffffff;
            max-width: 800px;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        /* ========== СТИЛИ ДЛЯ МЕДИА (ГАЛЕРЕЯ) ========== */
        .media-scroll-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .media-item {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 40px;
            margin-bottom: 80px;
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
            scroll-margin-top: 100px;
        }

        .media-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .media-image {
            flex: 1;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .media-image:hover {
            transform: scale(1.02);
        }

        .media-image img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 15px;
        }

        .media-description {
            flex: 1;
            font-family: 'SabFont2', Arial, sans-serif;
        }

        .media-description h3 {
            font-family: 'SabFont', Arial, sans-serif;
            font-size: 2rem;
            color: #ff3333;
            text-shadow: 0 0 5px #ff0000;
            margin-bottom: 15px;
        }

        .media-description p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #ffffff;
        }

        /* Чередование картинок */
        .media-item:nth-child(even) {
            flex-direction: row-reverse;
        }

        /* ========== ПОДВАЛ ========== */
        .footer {
            border-top: 1px solid rgba(255, 0, 0, 0.3);
            padding: 20px 40px;
            text-align: center;
            font-family: 'SabFont2', Arial, sans-serif;
            color: #aaaaaa;
            font-size: 0.9rem;
        }
        
        /* Кнопка поддержки */
        .support-button {
            display: inline-block;
            background: #ff0000;
            color: #fff;
            padding: 8px 16px;
            border-radius: 5px;
            text-decoration: none;
            font-family: 'SabFont', Arial, sans-serif;
            transition: all 0.3s ease;
        }
        .support-button:hover {
            background: #cc0000;
            box-shadow: 0 0 10px #ff0000;
        }
        
        /* Стили для переключателя языков (красный неон) */
        .language-switcher {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .lang-btn {
            background: none;
            border: 1px solid #ff0000;
            color: #ff6666;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'SabFont2', Arial, sans-serif;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }
        .lang-btn:hover {
            background: #ff0000;
            color: #fff;
            box-shadow: 0 0 8px #ff0000;
            text-shadow: 0 0 4px #fff;
        }
        .lang-btn.active {
            background: #ff0000;
            color: #fff;
            box-shadow: 0 0 12px #ff0000;
            border-color: #ff3333;
        }

        /* ========== АДАПТАЦИЯ ========== */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
                padding: 20px;
            }
            .nav-menu {
                gap: 20px;
                justify-content: center;
            }
            .nav-menu a {
                font-size: 1rem;
            }
            .main-content {
                padding: 30px 20px;
            }
            .page-title {
                font-size: 2rem;
            }
            .content-text {
                font-size: 1rem;
            }
            .logo {
                font-size: 1.5rem;
            }
            .media-item {
                flex-direction: column !important;
                gap: 20px;
                margin-bottom: 50px;
            }
            .media-description h3 {
                font-size: 1.5rem;
            }
            .media-description p {
                font-size: 1rem;
            }
        }
        /* ========== СТИЛИ ДЛЯ ССЫЛОК В КОНТАКТАХ ========== */
        .contact-link {
            color: #ff6666;
            text-decoration: none;
            transition: all 0.3s ease;
            border-bottom: 1px dashed rgba(255, 0, 0, 0.3);
        }
        .contact-link:hover {
            color: #ff0000;
            text-shadow: 0 0 5px #ff0000;
            border-bottom-color: #ff0000;
        }
        
        /* ========== ЗАСТАВКА ========== */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 1s ease;
        }
        .splash-content {
            text-align: center;
            font-family: 'SabFont', Arial, sans-serif;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .splash-content h1 {
            font-size: 4rem;
            color: #ff0000;
            text-shadow: 0 0 20px #ff0000, 0 0 40px #cc0000;
            letter-spacing: 4px;
        }
        .splash-content p {
            margin-top: 20px;
            font-size: 1rem;
            color: #ff6666;
            letter-spacing: 2px;
        }
        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1.02); text-shadow: 0 0 30px #ff0000; }
            100% { opacity: 0.6; transform: scale(0.98); }
        }
    </style>

        const pagesRu = {
            main: { title: "Главная", text: `<p class="content-text">Добро пожаловать на официальный сайт Red Ghost.</p><p class="content-text">Red Ghost — независимый игровой стартап, создающий атмосферную игру о космосе.</p><p class="content-text">Мы объединяем технологии, творчество и страсть к космосу, чтобы подарить игрокам уникальный опыт.</p><p class="content-text">Следите за развитием проекта — впереди много интересного!</p>` },
            project: { title: "Проект", text: `<p class="content-text">THE LAST WAR — это проект, который объединяет технологии и творчество.</p><p class="content-text">Здесь ты сможешь узнать подробности о концепции, этапах разработки и планах на будущее.</p><p class="content-text">Итак. Что же уже готово---<br>Карта двигательных систем с топливными цепочками.<br>Карта кораблей.<br>Карты оружий ближнего и дальнего боя.<br>Карта систем РЭБ (радио-электронной борьбы).<br>Карты систем щитов кораблей.<br>Карта энергетических систем кораблей.<br>Полный каталог двигателей (не путать с картами).<br>Полный каталог вооружения (не путать с картами).</p><p class="content-text">Над чем работа идёт сейчас---<br>На данный момент идёт работа над лором и сценарием игры.<br>Идёт работа над каталогом кораблей, названиями их в классификаторах (а сами имена кораблям будут давать игроки их купившие), размерами и прочими ТТХ.<br>И пока что всё т.к. не хватает рук для работы над всем сразу.</p>` },

        let currentLang = 'ru';
        let currentPageId = 'main';
        let currentMediaItems = mediaItemsRu;
        let currentPages = pagesRu;

        function renderMediaGallery() {
            const container = document.getElementById('media-container');
            if (!container) return;
            let html = '';
            currentMediaItems.forEach((item, index) => {
                html += `
                    <div class="media-item" data-index="${index}">
                        <div class="media-image">
                            <img src="${item.img}" alt="${item.title}" onerror="this.src='images/gallery/placeholder.jpg'">
                        </div>
                        <div class="media-description">
                            <h3>${item.title}</h3>
                            <p>${item.desc}</p>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            observeMediaItems();
        }
        
        function observeMediaItems() {
            const items = document.querySelectorAll('.media-item');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.2 });
            items.forEach(item => observer.observe(item));
        }

        function changeBackground(pageId) {
            const bgImage = backgrounds[pageId];
            if (bgImage) {
                document.body.style.backgroundImage = `url('${bgImage}')`;
            } else {
                document.body.style.backgroundImage = "none";
                document.body.style.backgroundColor = "#0a0a0a";
            }
        }

        function loadPage(pageId) {
            currentPageId = pageId;
            const page = currentPages[pageId];
            if (page) {
                document.getElementById('page-title').textContent = page.title;
                document.getElementById('page-text').innerHTML = page.text;
                changeBackground(pageId);
                if (pageId === 'media') {
                    renderMediaGallery();
                }
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function setLanguage(lang) {
