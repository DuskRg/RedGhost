<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Заставка</title>
    <style>
        @font-face {
            font-family: 'SabFont';
            src: url('fonts/sab.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
        }

        .preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeOut 0.8s ease-in-out 2.5s forwards;
        }

        .neon-text {
            font-family: 'SabFont', Arial, sans-serif;
            font-size: 10rem;
            color: #fff;
            text-align: center;
            letter-spacing: 4px;
            
            opacity: 0;
            transform: scale(0.8);
            
            animation: neonGlow 1.5s ease-out forwards;
        }

        @keyframes neonGlow {
            0% {
                opacity: 0;
                transform: scale(0.8);
                text-shadow: 0 0 0px rgba(255, 0, 0, 0);
            }
            50% {
                opacity: 1;
                transform: scale(1.05);
                text-shadow: 
                    0 0 10px #ff0000,
                    0 0 20px #ff0000,
                    0 0 30px #cc0000,
                    0 0 50px #990000;
            }
            100% {
                opacity: 1;
                transform: scale(1);
                text-shadow: 
                    0 0 5px #ff3333,
                    0 0 10px #ff0000,
                    0 0 20px #cc0000,
                    0 0 35px #8b0000;
            }
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
                visibility: visible;
            }
            100% {
                opacity: 0;
                visibility: hidden;
            }
        }

        @media (max-width: 768px) {
            .neon-text {
                font-size: 2rem;
                letter-spacing: 2px;
            }
        }

        @media (max-width: 480px) {
            .neon-text {
                font-size: 1.5rem;
                letter-spacing: 1px;
            }
        }
    </style>
</head>
<body>
    <div class="preloader" id="preloader">
        <div class="neon-text">
            Red Ghost
        </div>
    </div>

    <script>
        setTimeout(function() {
            window.location.href = "index.html";
        }, 3300);
    </script>
</body>
</html>
